<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MReact.ts Playground</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0a0a0a; color: #e0e0e0; }
    #app { max-width: 720px; margin: 0 auto; padding: 2rem; }
    h1 { color: #7dd3fc; margin-bottom: 0.5rem; }
    h2 { color: #a78bfa; margin: 1.5rem 0 0.5rem; font-size: 1.1rem; }
    p { margin: 0.25rem 0; }
    button {
      background: #1e293b; color: #e0e0e0; border: 1px solid #334155;
      padding: 0.4rem 0.8rem; border-radius: 4px; cursor: pointer; margin: 0.2rem;
      font-size: 0.9rem;
    }
    button:hover { background: #334155; }
    input {
      background: #1e293b; color: #e0e0e0; border: 1px solid #334155;
      padding: 0.4rem 0.6rem; border-radius: 4px; font-size: 0.9rem;
    }
    label { margin-right: 0.5rem; }
    .counter { margin: 1rem 0; }
    .hint { color: #94a3b8; font-size: 0.85rem; margin-top: 0.5rem; }
    .loading { color: #fbbf24; }
    nav { display: flex; gap: 0.5rem; margin: 0.5rem 0; }
    .done { text-decoration: line-through; opacity: 0.6; }
    .tab-selector button.active { background: #4f46e5; border-color: #6366f1; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
